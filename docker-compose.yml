services:
  findb-neon-data-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: strakertech/findb-neon-data-sync:prod-latest
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
